<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Wallpaper Settings</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    label { display: block; margin: 10px 0 5px; }
    input[type="number"] { width: 80px; }
    button { margin-top: 15px; padding: 6px 12px; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h2>Select Local Wallpapers</h2>
  <input type="file" id="input" webkitdirectory multiple accept="image/*" />
  <label for="interval">Interval (seconds):</label>
  <input type="number" id="interval" min="5" value="60" />
  <label for="shuffleToggle">Shuffle Images</label>
  <input type="checkbox" id="shuffleToggle" />
  <button id="saveButton">Save</button>
  <div id="status"></div>

  <script src="settings.js"></script>
</body>
</html>
